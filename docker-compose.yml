services:
  backend:
    build:
      context: ./backend
    container_name: fpk-express-api
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////data/fpk_smart_food.db
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      RATE_LIMIT_REQUESTS: 120
      RATE_LIMIT_WINDOW_SECONDS: 60
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
    container_name: fpk-express-web
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  backend_data:
